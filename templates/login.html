<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Canteen - Login</title>
    <style>
        /* General Page Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            /* Using a food-themed background image */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Modal Overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* The Login Box */
        .login-popup {
            background-color: #fff;
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
            position: relative;
        }

        /* Header containing Title */
        .login-header {
            margin-bottom: 20px;
            text-align: center;
        }

        .login-header h2 {
            margin: 0;
            font-size: 28px;
            color: #ff4d29; /* Brand color */
        }

        /* Error Message Styling from Flask */
        .error-message {
            color: #d9534f;
            background-color: #fdf7f7;
            border: 1px solid #d9534f;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #ff4d29; 
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #ff4d29; 
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #e63e1c;
        }

        /* Checkbox and Terms */
        .terms-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }

        .terms-container input[type="checkbox"] {
            margin-top: 2px;
            accent-color: #ff4d29;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-overlay">
        <div class="login-popup">
            
            <div class="login-header">
                <h2>Canteen Login</h2>
            </div>

            {% if error %}
                <div class="error-message">
                    {{ error }}
                </div>
            {% endif %}git push origin main

            <form method="POST">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Username (e.g., student)" required>
                </div>
                
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password (e.g., campus123)" required>
                </div>

                <button type="submit" class="login-btn">Login</button>

                <div class="terms-container">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">By continuing, I agree to the terms of use & privacy policy.</label>
                </div>
            </form>

        </div>
    </div>

</body>
</html>
