<!DOCTYPE html>
<html>
<head>
    <title>Kitchen Admin Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #2c3e50; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); text-align: center; }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; }
        button:hover { background: #c0392b; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>👨‍🍳 Kitchen Admin Login</h2>
        {% if error %} <p class="error">{{ error }}</p> {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Admin Username" required>
            <input type="password" name="password" placeholder="Admin Password" required>
            <button type="submit">Access Kitchen Dashboard</button>
        </form>
        <br>
        <a href="{{ url_for('login') }}">Back to Student Login</a>
    </div>
</body>
</html>
