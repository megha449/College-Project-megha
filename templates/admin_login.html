<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Kitchen Admin Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            overflow:hidden;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
            position:relative;
        }

        /* Animated Background */

        .bg{
            position:absolute;
            width:100%;
            height:100%;
            overflow:hidden;
            z-index:0;
        }

        .bubble{
            position:absolute;
            bottom:-120px;
            border-radius:50%;
            background:rgba(255,255,255,0.08);
            animation:rise linear infinite;
        }

        .bubble:nth-child(1){
            width:120px;
            height:120px;
            left:10%;
            animation-duration:10s;
        }

        .bubble:nth-child(2){
            width:180px;
            height:180px;
            left:70%;
            animation-duration:14s;
        }

        .bubble:nth-child(3){
            width:90px;
            height:90px;
            left:40%;
            animation-duration:9s;
        }

        .bubble:nth-child(4){
            width:150px;
            height:150px;
            left:85%;
            animation-duration:16s;
        }

        @keyframes rise{
            0%{
                transform:translateY(0) rotate(0deg);
                opacity:0;
            }

            30%{
                opacity:1;
            }

            100%{
                transform:translateY(-120vh) rotate(360deg);
                opacity:0;
            }
        }

        /* Chef Animation */

        .chef-container{
            position:absolute;
            z-index:10;
            animation:chefEntry 2s ease forwards;
        }

        .chef{
            font-size:130px;
            filter:drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        @keyframes chefEntry{

            0%{
                opacity:0;
                transform:translateY(300px) scale(0.3);
            }

            30%{
                opacity:1;
                transform:translateY(-80px) scale(1.2);
            }

            50%{
                transform:translateY(0px) scale(1);
            }

            70%{
                transform:translateY(-40px);
            }

            100%{
                transform:translateY(-300px);
                opacity:0;
            }
        }

        /* Login Box */

        .login-box{
            position:relative;
            width:390px;
            padding:45px 35px;
            border-radius:30px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            box-shadow:0 10px 40px rgba(0,0,0,0.4);
            z-index:20;
            text-align:center;

            opacity:0;
            transform:scale(0.7);

            animation:showBox 1s ease forwards;
            animation-delay:1.8s;

            overflow:hidden;
        }

        @keyframes showBox{
            to{
                opacity:1;
                transform:scale(1);
            }
        }

        .login-box::before{
            content:'';
            position:absolute;
            width:250%;
            height:250%;
            background:linear-gradient(
                45deg,
                transparent,
                rgba(255,255,255,0.08),
                transparent
            );

            top:-80%;
            left:-80%;
            transform:rotate(25deg);
            animation:shine 6s linear infinite;
        }

        @keyframes shine{
            0%{
                transform:translateX(-100%) rotate(25deg);
            }

            100%{
                transform:translateX(100%) rotate(25deg);
            }
        }

        h2{
            color:white;
            margin-bottom:30px;
            font-size:34px;
            font-weight:700;
            position:relative;
            z-index:2;
        }

        .input-group{
            position:relative;
            z-index:2;
            margin-bottom:22px;
        }

        input{
            width:100%;
            padding:16px;
            border:none;
            outline:none;
            border-radius:16px;
            background:rgba(255,255,255,0.1);
            color:white;
            font-size:15px;
            border:1px solid transparent;
            transition:0.4s;
        }

        input::placeholder{
            color:rgba(255,255,255,0.7);
        }

        input:focus{
            border:1px solid #ff6b6b;
            background:rgba(255,255,255,0.15);
            transform:scale(1.02);
            box-shadow:0 0 20px rgba(255,107,107,0.4);
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:16px;
            background:linear-gradient(135deg,#ff512f,#dd2476);
            color:white;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:0.4s;
            position:relative;
            z-index:2;
            overflow:hidden;
        }

        button:hover{
            transform:translateY(-3px) scale(1.02);
            box-shadow:0 10px 30px rgba(255,81,47,0.4);
        }

        button:active{
            transform:scale(0.97);
        }

        .back-link{
            display:inline-block;
            margin-top:20px;
            color:white;
            text-decoration:none;
            font-size:14px;
            transition:0.3s;
            position:relative;
            z-index:2;
        }

        .back-link:hover{
            color:#ffb3b3;
            transform:translateX(-5px);
        }

        /* Error Popup */

        .popup-error{
            position:fixed;
            top:30px;
            right:30px;
            background:rgba(255,59,59,0.95);
            color:white;
            padding:16px 24px;
            border-radius:14px;
            font-size:15px;
            font-weight:bold;
            box-shadow:0 10px 25px rgba(0,0,0,0.4);
            z-index:9999;

            animation:
                popupIn 0.5s ease,
                popupOut 0.5s ease 3s forwards;
        }

        @keyframes popupIn{
            from{
                transform:translateX(300px);
                opacity:0;
            }

            to{
                transform:translateX(0);
                opacity:1;
            }
        }

        @keyframes popupOut{
            to{
                transform:translateX(300px);
                opacity:0;
            }
        }

        /* Floating Food */

        .food{
            position:absolute;
            font-size:35px;
            opacity:0.25;
            animation:floatFood 12s linear infinite;
        }

        .food1{
            left:5%;
            animation-delay:0s;
        }

        .food2{
            left:25%;
            animation-delay:3s;
        }

        .food3{
            left:60%;
            animation-delay:5s;
        }

        .food4{
            left:85%;
            animation-delay:1s;
        }

        @keyframes floatFood{
            0%{
                bottom:-80px;
                transform:rotate(0deg);
            }

            100%{
                bottom:120%;
                transform:rotate(360deg);
            }
        }

        @media(max-width:450px){

            .login-box{
                width:90%;
                padding:35px 20px;
            }

            .chef{
                font-size:100px;
            }

            h2{
                font-size:28px;
            }
        }

    </style>

</head>

<body>

    <!-- Background -->
    <div class="bg">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- Floating Food -->
    <div class="food food1">🍕</div>
    <div class="food food2">🍔</div>
    <div class="food food3">🍜</div>
    <div class="food food4">🍟</div>

    <!-- Chef Animation -->
    <div class="chef-container">
        <div class="chef">👨‍🍳</div>
    </div>

    <!-- Error Popup -->
    {% if error %}
    <div class="popup-error">
        ❌ Invalid Login Credentials
    </div>
    {% endif %}

    <!-- Login Box -->
    <div class="login-box">

        <h2>Kitchen Admin</h2>

        <form method="POST">

            <div class="input-group">
                <input type="text"
                       name="username"
                       placeholder="Admin Username"
                       required>
            </div>

            <div class="input-group">
                <input type="password"
                       name="password"
                       placeholder="Admin Password"
                       required>
            </div>

            <button type="submit">
                Access Kitchen Dashboard
            </button>

        </form>

        <a href="{{ url_for('login') }}" class="back-link">
            ← Back to Student Login
        </a>

    </div>

</body>
</html>
