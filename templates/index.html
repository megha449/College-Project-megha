<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Campus Canteen</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#f5f7fb;
            min-height:100vh;
            color:#222;
        }

        /* HEADER */

        .header{
            width:100%;
            background:linear-gradient(135deg,#ff6b35,#ff3c78);
            padding:20px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
        }

        .logo{
            color:white;
            font-size:32px;
            font-weight:700;
        }

        .header-buttons{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .admin-btn{
            text-decoration:none;
            padding:12px 18px;
            border-radius:10px;
            font-weight:600;
            color:white;
            transition:0.3s;
        }

        .dashboard-btn{
            background:#111827;
        }

        .logout-btn{
            background:#dc2626;
        }

        .admin-btn:hover{
            transform:translateY(-2px);
            opacity:0.9;
        }

        /* MAIN LAYOUT */

        .container{
            display:flex;
            gap:25px;
            padding:25px;
        }

        .main-content{
            flex:3;
        }

        .sidebar{
            flex:1;
            background:rgba(255,255,255,0.75);
            backdrop-filter:blur(12px);
            padding:20px;
            border-radius:20px;
            box-shadow:0 8px 30px rgba(0,0,0,0.08);
            height:fit-content;
            position:sticky;
            top:20px;
        }

        .section-title{
            font-size:28px;
            margin-bottom:20px;
            font-weight:700;
        }

        /* MENU GRID */

        .menu-container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        }

        .menu-item{
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .menu-item:hover{
            transform:translateY(-8px);
        }

        .food-image{
            width:100%;
            height:180px;
            object-fit:cover;
        }

        .menu-content{
            padding:18px;
        }

        .menu-content h3{
            margin-bottom:8px;
            font-size:22px;
        }

        .category{
            color:#777;
            font-size:14px;
            margin-bottom:10px;
        }

        .price{
            color:#16a34a;
            font-size:24px;
            font-weight:700;
            margin-bottom:15px;
        }

        .add-btn{
            width:100%;
            border:none;
            padding:12px;
            border-radius:12px;
            background:linear-gradient(135deg,#ff6b35,#ff3c78);
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .add-btn:hover{
            opacity:0.9;
        }

        /* CART */

        .cart-title{
            font-size:26px;
            margin-bottom:20px;
        }

        .cart-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:15px;
            background:#f8fafc;
            padding:12px;
            border-radius:12px;
        }

        .remove-btn{
            border:none;
            background:#ef4444;
            color:white;
            padding:4px 8px;
            border-radius:6px;
            cursor:pointer;
            margin-left:10px;
        }

        .total-box{
            margin-top:20px;
            font-size:24px;
            font-weight:700;
        }

        .place-order-btn{
            width:100%;
            margin-top:20px;
            border:none;
            padding:14px;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:17px;
            font-weight:600;
            cursor:pointer;
        }

        .place-order-btn:hover{
            opacity:0.9;
        }

        select,input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:16px;
            border-radius:10px;
            border:1px solid #ddd;
            font-size:15px;
        }

        .payment-section{
            display:none;
        }

        .order-tracker{
            display:none;
            text-align:center;
        }

        .status-badge{
            display:inline-block;
            margin-top:15px;
            padding:12px 20px;
            border-radius:30px;
            background:#facc15;
            font-weight:700;
            font-size:18px;
        }

        /* MOBILE */

        @media(max-width:900px){

            .container{
                flex-direction:column;
            }

            .sidebar{
                position:relative;
                top:0;
            }

        }

        @media(max-width:600px){

            .header{
                padding:20px;
            }

            .logo{
                font-size:24px;
            }

            .section-title{
                font-size:24px;
            }

        }

    </style>
</head>
<body>

    <!-- HEADER -->

    <div class="header">

        <div class="logo">
            🍔 Campus Canteen
        </div>

        <div class="header-buttons">

            <a href="{{ url_for('admin_login') }}" class="admin-btn dashboard-btn">
                ⚙️ Admin Dashboard
            </a>

            <a href="{{ url_for('logout') }}" class="admin-btn logout-btn">
                Logout
            </a>

        </div>

    </div>

    <!-- MAIN -->

    <div class="container">

        <!-- MENU -->

        <div class="main-content">

            <h2 class="section-title">Popular Foods 🍕</h2>

            <div class="menu-container" id="menu"></div>

        </div>

        <!-- SIDEBAR -->

        <div class="sidebar">

            <div id="cart-section">

                <h2 class="cart-title">🛒 Your Cart</h2>

                <div id="cart-items">
                    <p style="color:#777;">Your cart is empty.</p>
                </div>

                <div class="total-box">
                    Total: ₹<span id="cart-total">0</span>
                </div>

                <button id="checkout-btn"
                        class="place-order-btn"
                        style="display:none;"
                        onclick="showPayment()">
                    Proceed to Payment
                </button>

            </div>

            <!-- PAYMENT -->

            <div id="payment-section" class="payment-section">

                <h2 class="cart-title">💳 Payment</h2>

                <label>Payment Method</label>

                <select id="payment-method">
                    <option value="UPI">UPI (GPay / PhonePe)</option>
                    <option value="Card">Credit / Debit Card</option>
                    <option value="Cash">Cash at Counter</option>
                </select>

                <label>Student ID</label>

                <input type="text"
                       id="student-id"
                       placeholder="Enter Student ID">

                <button class="place-order-btn" onclick="placeOrder()">
                    Confirm & Pay ₹<span id="pay-total">0</span>
                </button>

                <button class="place-order-btn"
                        style="background:#9ca3af;"
                        onclick="cancelPayment()">
                    Cancel
                </button>

            </div>

            <!-- ORDER TRACKER -->

            <div id="order-tracker" class="order-tracker">

                <h2>✅ Order Placed</h2>

                <p>
                    Order ID:
                    <strong>#<span id="display-order-id"></span></strong>
                </p>

                <div class="status-badge" id="live-status">
                    Preparing 🍳
                </div>

            </div>

        </div>

    </div>

<script>

    let cart = [];
    let orderPollingInterval = null;

    // FOOD IMAGES

    const foodImages = [
        "https://images.unsplash.com/photo-1568901346375-23c9450c58cd",
        "https://images.unsplash.com/photo-1546069901-ba9599a7e63c",
        "https://images.unsplash.com/photo-1513104890138-7c749659a591",
        "https://images.unsplash.com/photo-1604908176997-125f25cc6f3d",
        "https://images.unsplash.com/photo-1504674900247-0877df9cc836",
        "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38"
    ];

    // FETCH MENU

    fetch('/api/menu')
        .then(response => response.json())
        .then(data => {

            const menuDiv = document.getElementById('menu');

            data.forEach((item,index) => {

                const div = document.createElement('div');

                div.className = 'menu-item';

                const img = foodImages[index % foodImages.length];

                div.innerHTML = `

                    <img src="${img}"
                         class="food-image"
                         alt="${item.name}">

                    <div class="menu-content">

                        <h3>${item.name}</h3>

                        <p class="category">${item.category}</p>

                        <p class="price">₹${item.price}</p>

                        <button class="add-btn"
                                onclick='addToCart(${JSON.stringify(item)})'>
                            Add to Cart
                        </button>

                    </div>

                `;

                menuDiv.appendChild(div);

            });

        });

    // CART

    function addToCart(item){

        cart.push(item);

        updateCartUI();

    }

    function removeFromCart(index){

        cart.splice(index,1);

        updateCartUI();

    }

    function updateCartUI(){

        const cartItemsDiv = document.getElementById('cart-items');
        const cartTotalSpan = document.getElementById('cart-total');
        const payTotalSpan = document.getElementById('pay-total');
        const checkoutBtn = document.getElementById('checkout-btn');

        cartItemsDiv.innerHTML = '';

        let total = 0;

        if(cart.length === 0){

            cartItemsDiv.innerHTML =
                '<p style="color:#777;">Your cart is empty.</p>';

            checkoutBtn.style.display = 'none';

        } else {

            checkoutBtn.style.display = 'block';

            cart.forEach((item,index)=>{

                total += item.price;

                cartItemsDiv.innerHTML += `

                    <div class="cart-item">

                        <span>${item.name}</span>

                        <span>

                            ₹${item.price}

                            <button class="remove-btn"
                                    onclick="removeFromCart(${index})">
                                X
                            </button>

                        </span>

                    </div>

                `;

            });

        }

        cartTotalSpan.innerText = total;
        payTotalSpan.innerText = total;

    }

    // PAYMENT

    function showPayment(){

        document.getElementById('cart-section').style.display='none';
        document.getElementById('payment-section').style.display='block';

    }

    function cancelPayment(){

        document.getElementById('payment-section').style.display='none';
        document.getElementById('cart-section').style.display='block';

    }

    // PLACE ORDER

    function placeOrder(){

        const total =
            parseInt(document.getElementById('cart-total').innerText);

        const paymentMethod =
            document.getElementById('payment-method').value;

        const orderData = {

            cart: cart,
            total: total,
            payment_method: paymentMethod

        };

        fetch('/api/place_order', {

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(orderData)

        })

        .then(response => response.json())

        .then(data => {

            document.getElementById('payment-section').style.display='none';

            document.getElementById('order-tracker').style.display='block';

            document.getElementById('display-order-id').innerText =
                data.order_id;

            document.getElementById('live-status').innerText =
                data.status;

            cart = [];

            updateCartUI();

            startOrderTracking(data.order_id);

        });

    }

    // TRACK ORDER

    function startOrderTracking(orderId){

        orderPollingInterval = setInterval(()=>{

            fetch('/api/order_status/' + orderId)

            .then(response => response.json())

            .then(data => {

                const statusBadge =
                    document.getElementById('live-status');

                statusBadge.innerText = data.status;

                if(data.status.includes('Completed')
                    || data.status.includes('✅')){

                    statusBadge.style.background='#22c55e';
                    statusBadge.style.color='white';

                    clearInterval(orderPollingInterval);

                }
                else if(data.status.includes('Ready')){

                    statusBadge.style.background='#06b6d4';
                    statusBadge.style.color='white';

                }

            });

        },3000);

    }

</script>

</body>
</html>
